# Declarative catalog of Lark Bitable tables to ingest.
# Each entry maps 1:1 to a dlt resource built by build_table_resource.
#   resource_name: destination table name (raw_lark.<resource_name>)
#   table_id:      Lark Bitable table id (tbl...)
#   wiki_token:    Wiki node token embedding the Base; resolved to an app_token
#                  (tables may live in different Wiki spaces / Bases)
#   primary_key:   merge key(s); defaults to record_id
#   column_hints:  optional dlt column type overrides
tables:
  - resource_name: crm_customers
    table_id: tbl5OhHSxcMbqe3m
    wiki_token: UsizwSlx3iwoURkmTEHlv5vJgtd
    primary_key: record_id
