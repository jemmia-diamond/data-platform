# Larksuite ingestion catalog.
#
# `apis`      — reusable, config-driven API definitions (endpoints live here, not
#               in Python). Add a new page_token-paginated Larksuite API by adding an
#               entry with reader: cursor — no code change needed.
# `resources` — what to ingest; each maps 1:1 to a dlt resource, dispatched by `api`.
#
# Template placeholders ({obj_token}, {table_id}, {document_id}, {sheet_id}, ...)
# are filled from the resolved object token and the resource's own fields.

apis:
  bitable:
    reader: cursor
    obj_types: [bitable]
    token_field: app_token                 # direct-token field (else use wiki_token)
    cursor_obj_token_column: app_token      # stamped onto every record
    cursor_base_path: bitable/v1/apps/{obj_token}
    cursor_endpoint_path: tables/{table_id}/records
    cursor_query_params: {page_size: 500, automatic_fields: "true"}
    cursor_data_selector: data.items
    primary_key: record_id

  doc:
    reader: cursor
    obj_types: [docx, doc]
    token_field: document_id
    cursor_obj_token_column: document_id
    cursor_base_path: docx/v1/documents/{obj_token}
    cursor_endpoint_path: blocks
    cursor_query_params: {page_size: 500}
    cursor_data_selector: data.items
    primary_key: block_id

  sheet:
    reader: sheet_values
    obj_types: [sheet]
    token_field: spreadsheet_token
    sheet_values_path: sheets/v2/spreadsheets/{obj_token}/values/{sheet_id}
    sheet_row_json_column: data             # header-keyed JSON object per data row
    primary_key: [spreadsheet_token, sheet_id, row_number]

