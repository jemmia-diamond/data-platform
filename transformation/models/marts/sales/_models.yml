version: 2

models:
  - name: fct_sales_orders
    description: "Retail sales order fact table. Grain: 1 row = 1 valid confirmed order. Excludes draft, test, cancelled, and compensation orders."
    columns:
      - name: order_id
        description: "Primary key — unified sales order ID."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to dim_sales_customers. Known gap: 96 Haravan-only customers not yet in dim."
      - name: sales_channel
        description: "Sales channel translated to Vietnamese."
      - name: payment_status
        description: "Payment status translated to Vietnamese."
      - name: fulfillment_status
        description: "Fulfillment status translated to Vietnamese."
        tests:
          - accepted_values:
              arguments:
                values:
                  - "Đã giao hàng"
                  - "Chưa giao hàng"
                  - "Chưa xác định"
      - name: processing_status
        description: "Processing status translated to Vietnamese."
      - name: order_customer_type
        description: "Customer type — Khách mới or Khách cũ."
      - name: product_categories
        description: "Comma-separated product category names from ERPNext (e.g. 'Nhẫn Nam, Dây Chuyền'). NULL for Haravan-only orders."
      - name: purchase_purposes
        description: "Comma-separated purchase purpose names from ERPNext (e.g. 'BT - Mua cho bản thân, CH - Cầu hôn'). NULL for Haravan-only orders."
      - name: price_range
        description: "Price range bucket (triệu VND) based on total_price summed across split_order_group."

  - name: fct_sales_order_items
    description: "Order-item-level sales fact. INNER JOINs fct_sales_orders to inherit valid-order filters."
    columns:
      - name: order_item_id
        description: "Primary key for the sales order item."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to fct_sales_orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_sales_orders')
                field: order_id
      - name: customer_id
        description: "Foreign key to dim_sales_customers inherited from the order. Known gap: 260 items reference customers not yet in dim."
        tests:
          - not_null
      - name: product_key
        description: "Foreign key to dim_sales_products (variant_id). NULL if item has no variant."

  - name: fct_sales_attributions
    description: "Order-level sales attribution — splits order revenue to sales people by ERPNext sales team percentages."
    columns:
      - name: attribution_key
        description: "Primary key — order_id x sales_team_id."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to fct_sales_orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_sales_orders')
                field: order_id
      - name: sales_person_key
        description: "Foreign key to dim_sales_persons."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sales_persons')
                field: sales_person_id

  - name: dim_sales_products
    description: "Variant-grain product dimension from catalog."
    columns:
      - name: product_key
        description: "Primary key — variant ID."
        tests:
          - unique
          - not_null
      - name: diamond_edge_size
        description: "Larger of diamond_edge_size_1 and diamond_edge_size_2, rounded down to 1 decimal (FLOOR)."
      - name: diamond_edge_size_display
        description: "Combined edge sizes as string '4.5 x 5.0' (FLOOR rounded, 1 decimal each). NULL if either is NULL."

  - name: dim_sales_customers
    description: "Customer dimension — profile from CRM enriched with order metrics."
    columns:
      - name: customer_id
        description: "Primary key — unified customer ID."
        tests:
          - unique
          - not_null

  - name: dim_sales_persons
    description: "Sales person dimension with active, presale, region, store, and position fields."
    columns:
      - name: sales_person_id
        description: "Primary key — ERPNext sales person ID."
        tests:
          - unique
          - not_null
      - name: region_name
        description: "Sales region — Miền Bắc / Miền Nam / Miền Tây."
      - name: city_name
        description: "City derived from parent sales person config name parsing (Hà Nội / Hồ Chí Minh / Cần Thơ / National)."

  - name: fct_sales_targets_monthly
    description: "Monthly salesperson target fact."
    columns:
      - name: sales_target_key
        description: "Primary key for monthly salesperson target records."
        tests:
          - unique
          - not_null
      - name: sales_person_key
        description: "Foreign key to dim_sales_persons."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sales_persons')
                field: sales_person_id

  - name: fct_sales_kpi_daily
    description: "Daily sales KPI — actual vs target per sales person per day with MTD cumulative. Grain: 1 row = 1 sales_person × 1 date."
    columns:
      - name: kpi_daily_key
        description: "Primary key — sales_person_key:date_actual."
        tests:
          - unique
          - not_null
      - name: sales_person_key
        description: "Foreign key to dim_sales_persons."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sales_persons')
                field: sales_person_id
      - name: date_actual
        description: "Foreign key to dim_sales_dates."
        tests:
          - not_null
      - name: mtd_achievement_gross_pct
        description: "MTD gross revenue / monthly target. NULL when no target."
      - name: month_progress_pct
        description: "Day of month / days in month. Indicates time progress."

  - name: dim_sales_lead_sources
    description: "Lead source dimension — lookup table for lead origination channels (Facebook pages, Zalo, etc.)."
    columns:
      - name: lead_source_id
        description: "Primary key — ERPNext lead source ID."
        tests:
          - unique
          - not_null

  - name: fct_sales_leads
    description: "Lead fact table. Grain: 1 row = 1 lead from ERPNext. Includes conversion metrics, sales person attribution, and source info."
    columns:
      - name: lead_id
        description: "Primary key — ERPNext lead ID."
        tests:
          - unique
          - not_null
      - name: sales_person_key
        description: "Foreign key to dim_sales_persons. NULL if lead is unassigned."
        tests:
          - relationships:
              arguments:
                to: ref('dim_sales_persons')
                field: sales_person_id
      - name: lead_status
        description: "Lead status translated to Vietnamese."
      - name: qualification_status
        description: "Qualification status translated to Vietnamese."
      - name: is_converted
        description: "Boolean flag indicating if the lead was qualified/converted."
        tests:
          - not_null
      - name: budget_lead
        description: "Budget range reference ID (e.g. CRM-LEAD-BUDGET-0005)."
      - name: budget_label
        description: "Budget range label (e.g. > 120 Triệu, 30 - 50 Triệu)."
      - name: budget_from
        description: "Budget range lower bound in VND."
      - name: budget_to
        description: "Budget range upper bound in VND."
      - name: purpose_lead
        description: "Demand/purpose reference ID (e.g. CRM-LEAD-DEMAND-0011)."
      - name: demand_label
        description: "Demand/purpose label (e.g. Mua cầu hôn, Mua cho bản thân)."

  - name: fct_sales_lead_preferred_products
    description: "Bridge table for lead preferred products. Grain: 1 row = 1 lead × 1 preferred product. 1 lead can have many products (1-n)."
    columns:
      - name: preferred_product_id
        description: "Primary key — unique row ID from ERPNext child table."
        tests:
          - unique
          - not_null
      - name: lead_id
        description: "Foreign key to fct_sales_leads."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_sales_leads')
                field: lead_id
      - name: product_type
        description: "Product type reference ID (e.g. CRM-LEAD-PRODUCT-0014)."
      - name: product_label
        description: "Product type label (e.g. Kim cương viên, Nhẫn Nữ, Dây Chuyền)."

  - name: fct_sales_order_product_categories
    description: "Bridge table for order product categories. Grain: 1 row = 1 order × 1 product category. Only includes ERPNext-matched orders."
    columns:
      - name: order_product_category_key
        description: "Primary key — order_id:product_category_id."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to fct_sales_orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_sales_orders')
                field: order_id
      - name: product_category_id
        description: "Foreign key to ERPNext Product Category master (e.g. PC08421)."
        tests:
          - not_null
      - name: category_name
        description: "Product category display name (e.g. Nhẫn Nam KCTN Nguyên Chiếc)."

  - name: fct_sales_order_purchase_purposes
    description: "Bridge table for order purchase purposes. Grain: 1 row = 1 order × 1 purchase purpose. Only includes ERPNext-matched orders."
    columns:
      - name: order_purchase_purpose_key
        description: "Primary key — order_id:purchase_purpose_id."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to fct_sales_orders."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_sales_orders')
                field: order_id
      - name: purchase_purpose_id
        description: "Foreign key to ERPNext Purchase Purpose master (e.g. PP08603)."
        tests:
          - not_null
      - name: purpose_name
        description: "Purchase purpose display name (e.g. BT - Mua cho bản thân)."

  - name: fct_sales_leads_orders
    description: >
      Fact table combining lead source data with qualified lead metrics and sales order data.
      Materialized as a materialized view in the marts_sales schema.
      Performs a full join between lead entries and qualified leads, then left joins with sales orders.
    config:
      materialized: materialized_view
      schema: marts_sales

    columns:
      - name: date
        description: "Primary date field — greatest from lead_entry_date (entry side) or converted_date (qualified side)."

      - name: lead_entry_date
        description: "Date the lead was entered into the system."

      - name: converted_date
        description: "Date the lead was converted / qualified."

      - name: qualification_status_raw
        description: "Raw qualification status of the lead (e.g. 'Qualified')."

      - name: lead_id_unified
        description: "Unified lead ID, coalesced from both sides of the full join."

      - name: l_lead_id
        description: "Lead ID from the lead_source (entry date) side of the full join."

      - name: q_lead_id
        description: "Lead ID from the qualified_lead_source (converted date) side of the full join."

      - name: sales_region
        description: "Sales region associated with the lead, coalesced from both join sides."

      - name: region
        description: "Geographic region of the lead, coalesced from both join sides."

      - name: budget_label
        description: "Budget classification label for the lead."

      - name: lead_owner
        description: "Name or identifier of the person who owns the lead."

      - name: lead_source_name
        description: "Name of the lead source channel."
        meta:
          indexed: true

      - name: lead_source_platform
        description: "Platform associated with the lead source."

      - name: demand_label
        description: "Demand classification label for the lead."

      - name: gender
        description: "Gender of the lead contact."

      - name: consultation_date_range
        description: >
          Bucketed time difference (in days) between lead_entry_date and converted_date.
          Values: '7 Ngày' (≤7 days), '14 Ngày' (≤14 days), '30 ngày' (≤30 days),
          '60 ngày' (≤60 days), '90 ngày' (≤90 days), 'trên 90' (>90 days),
          'Chưa xác định' (NULL or no match).

      - name: qualified_lead_id
        description: "Lead ID if qualification_status_raw = 'Qualified', otherwise NULL."

      - name: qualified_lead_id_not_in_month
        description: >
          Lead ID for qualified leads where lead_entry_date and converted_date fall in different months.
          NULL otherwise.

      - name: qualified_lead_id_in_month
        description: >
          Lead ID for qualified leads where lead_entry_date and converted_date fall in the same month.
          NULL otherwise.

      - name: qualified_lead_id_in_day
        description: >
          Lead ID for qualified leads where lead_entry_date equals converted_date (converted on the same day).
          NULL otherwise.

      - name: order_date
        description: >
          Order date that occurs after qualified date (coverted_date)

      - name: lead_name_has_order_group
        description: >
          Order group name that occurs after qualified date (coverted_date)

      - name: lead_name_has_order_group
        description: >
          Order group name that occurs after qualified date (coverted_date)

      - name: total_price_lead_name_has_order
        description: >
          Total price of Qualified lead that has order that occurs after the qualified date (coverted_date)

      - name: time_to_convert_hours
        description: >
          Hour from converted lead till has first order
