version: 2

models:
  - name: fct_marketing_omnichannel_daily
    description: "Daily marketing spend aggregate across Facebook, Google, and TikTok on a date x platform grid."
    columns:
      - name: marketing_perf_key
        description: "Primary key — MD5 hash of report_date + platform_name."
        tests:
          - unique
          - not_null
      - name: report_date
        description: "Foreign key to dim_dates."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_actual
      - name: platform_name
        description: "Advertising platform name."
        tests:
          - accepted_values:
              arguments:
                values: ['Facebook', 'Google', 'TikTok']

  - name: fct_marketing_facebook_ads_daily
    description: "Daily Facebook ads fact at ad granularity with campaign, adset, and ad enrichment."
    columns:
      - name: fact_fb_ads_key
        description: "Primary key from staging."
        tests:
          - unique
          - not_null

  - name: dim_marketing_dates
    description: "View alias of dim_dates for self-contained Metabase schema access."
    columns:
      - name: date_actual
        description: "Primary key — actual calendar date."
        tests:
          - unique
          - not_null

  - name: fct_marketing_facebook_ads_aggregation
    description: "Marketing Facebook Ads daily with standardized dimensions"
    columns:
      - name: report_date
        description: "Report date"

      - name: account_id
        description: "Ad account ID"

      - name: ad_status
        description: "Ad status"

      - name: ad_id
        description: "Ad ID"

      - name: campaign_status
        description: "Campaign status"

      - name: fx_adset_audience_name
        description: "Adset audience name"

      - name: fx_adset_region
        description: "Adset region"

      - name: price_segment
        description: "Ad price segment (Sales goal only)"

      - name: ad_channel
        description: "Ad channel by fanpage"

      - name: ad_objective
        description: "Campaign objective (Mess / View / Push)"

      - name: ad_purpose
        description: "Ad purpose (Sales / Branding)"

      - name: ad_region
        description: "Ad region"

      - name: ad_type
        description: "Ad type (Knowed / Lookalike / New)"

      - name: product_category
        description: "Product category (Sales goal only)"

      - name: product_type
        description: "Product type (Sales goal only)"

      - name: audience_type
        description: "Audience type (Knowed / Lookalike / New)"

      - name: spend
        description: "Ad spend"

      - name: lead
        description: "Number of conversation started"

      - name: qualified_lead
        description: "Number of qualified leads"
