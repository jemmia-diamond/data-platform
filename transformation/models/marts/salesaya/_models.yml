version: 2

models:
  - name: dim_salesaya_warehouses
    description: "Salesaya warehouse feed — core Haravan location attributes (warehouse) exposed for the Salesaya system. Grain is one row per Haravan location."
    columns:
      - name: warehouse_id
        description: "Primary key for the warehouse (Haravan location ID)."
        tests:
          - unique
          - not_null
      - name: warehouse_name
        description: "Warehouse display name."
        tests:
          - not_null
      - name: warehouse_type
        description: "Location type of the warehouse (e.g. warehouse, store)."
      - name: is_primary_warehouse
        description: "True if this is the primary warehouse location."
      - name: warehouse_status
        description: "Operational status of the warehouse."

  - name: dim_salesaya_lead_qualification
    description: "Salesaya lead-qualification feed (legacy lead_isqualified) — one row per ERPNext contact link to a lead, exposing the lead's qualification flag, status, budget, pre-sales owner and the owner's Pancake ID, plus the contact's Pancake conversation. Sales / sales_pancake_id are intentionally empty placeholders mirroring the legacy view."
    columns:
      - name: id
        description: "Lead identifier (ERPNext lead document name)."
        tests:
          - not_null
      - name: qualified
        description: "True when the lead's qualification_status is 'Qualified'."
      - name: pancake_conversation_id
        description: "Pancake conversation ID from the linked contact."
      - name: pre_sales
        description: "Lead owner (pre-sales) email."
      - name: pre_sales_pancake_id
        description: "Pancake ID of the lead owner, resolved from ERPNext users."

  - name: fct_salesaya_lead_conversations
    description: "Salesaya lead-conversation feed (legacy find_lead_conversation) — record counts per lead, Pancake page, Pancake conversation and source, derived from ERPNext contacts. Grain is one row per (lead_id, pancake_page_id, pancake_conversation_id, source_name)."
    columns:
      - name: lead_id
        description: "Lead identifier taken from the first entry of the contact's dynamic links."
      - name: pancake_page_id
        description: "Pancake page ID of the conversation."
      - name: pancake_conversation_id
        description: "Pancake conversation ID."
      - name: source_name
        description: "Marketing source name of the contact."
      - name: total_records
        description: "Number of contact records in the group."
        tests:
          - not_null

  - name: dim_salesaya_customers
    description: "Salesaya customer-lookup feed (legacy find_customer) — ERPNext customers passed through with profile, contact, identity, tax, loyalty, revenue and settings attributes. Grain is one row per ERPNext customer. Note: child-table fields (account, portal_users, companies, sales_team, coupon_table, credit_limits), uuid, and database_created_at/updated_at are disabled because they are not produced by the Frappe ingestion."
    columns:
      - name: name
        description: "Primary key for the customer (ERPNext document name)."
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Display name of the customer."
      - name: customer_type
        description: "Customer type (e.g. Individual, Company)."
      - name: email_id
        description: "Primary email of the customer."
      - name: phone
        description: "Primary phone number of the customer."
      - name: haravan_id
        description: "Linked Haravan customer ID."

  - name: fct_haravan_jewelry_query
    description: "Salesaya jewelry feed (legacy jewelry_query) — Haravan products that have a design with a non-empty retouch, enriched with NocoDB design attributes (gender, collection, ring styles, 4view, workplace media) and a JSON array of variants (best active/scheduled collection deal per variant, price, primary stock location, ring size, material, serial number). Includes product-level aggregates (min sale price, total quantity, ring sizes). Grain is one row per Haravan product. Note: storage sizes are disabled because the NocoDB variant_serials table has no storage_size fields (they live on jewelries)."
    columns:
      - name: id
        description: "Primary key for the jewelry product (Haravan product ID)."
        tests:
          - unique
          - not_null
      - name: title
        description: "Haravan product title."
      - name: product_type
        description: "Haravan product type."
      - name: variants
        description: "JSON array of variants with per-variant price, best collection deal, primary stock location, ring size, material, and serial number."
      - name: min_sale_price
        description: "Minimum sale price across the product's qualifying variants."
      - name: total_product_qty
        description: "Total available quantity across the product's variants and warehouses."
      - name: all_ring_sizes
        description: "Array of all non-null ring sizes offered by the product's variants."

  - name: fct_salesaya_jewelry_query
    description: "Salesaya product feed — Haravan products (excluding loose 'Round'/'Pear' stones) enriched with NocoDB design attributes, best available collection deal, and a JSON array of in-stock variants (per-warehouse price, discount, quantity, serial numbers, and sold flag). Only products that have at least one in-stock variant are included. Grain is one row per Haravan product."
    columns:
      - name: id
        description: "Primary key for the product (Haravan product ID)."
        tests:
          - unique
          - not_null
      - name: title
        description: "Haravan product title."
      - name: product_type
        description: "Haravan product type (loose 'Round'/'Pear' stones are excluded)."
      - name: discount_type
        description: "Discount type of the product's best available collection deal ('percent' or 'amount')."
      - name: discount_value
        description: "Discount value of the product's best available collection deal."
      - name: totalQuantity
        description: "Total available quantity across all warehouses and in-stock variants."
      - name: variants
        description: "JSON array of in-stock variants with per-warehouse pricing, discount, quantity, ring size, material, serial numbers, and a flag indicating whether the variant has ever been sold."

  - name: dim_salesaya_wedding_rings
    description: "Salesaya wedding-ring feed — wedding rings that have a complete pair (both a male 'Nam' and female 'Nữ' 'Nhẫn Cưới' design mapped to a live Haravan product), with a generated display title. Grain is one row per wedding ring."
    columns:
      - name: id
        description: "Primary key for the wedding ring (NocoDB wedding_rings ID)."
        tests:
          - unique
          - not_null
      - name: title
        description: "Generated display title: 'Nhẫn Cưới ' followed by the distinct design codes joined with ' / '."
        tests:
          - not_null

  - name: fct_salesaya_diamonds
    description: "Salesaya diamond feed — per-diamond attributes enriched with Haravan variant stock, per-warehouse availability, Haravan collection membership, best available deal, and flags indicating whether the diamond has ever been sold. Grain is one row per diamond. Note: gia_pdf_url and encrypted_report_no are disabled pending ingestion of the gia/supplychain sources; expected_arrival_date is unavailable because the NocoDB diamonds table has no such field."
    columns:
      - name: id
        description: "Primary key for the diamond (NocoDB diamond ID)."
        tests:
          - unique
          - not_null
      - name: variant_id
        description: "Associated Haravan variant ID."
      - name: product_id
        description: "Associated Haravan product ID."
      - name: base_price
        description: "List price of the diamond before any collection discount."
      - name: sale_price
        description: "Price after applying the best available collection discount (percent or amount)."
      - name: discount_type
        description: "Discount type of the best available deal ('percent' or 'amount')."
      - name: warehouses
        description: "JSON array of warehouses (id, name, qty_available) where the variant has available stock."
      - name: collections
        description: "JSON array of Haravan collections the diamond belongs to."
      - name: exist_in_line_items
        description: "True if the diamond's variant/product pair appears in any Haravan order line."
      - name: is_temp_product_and_exist_in_line_items
        description: "True if the diamond's report number matches a temporary product that has been sold on Haravan."

  - name: dim_salesaya_haravan_collections
    description: "Salesaya collection feed (legacy salesaya_haravan_collections) — NocoDB haravan_collections passed through with title, discount configuration and validity window. Grain is one row per Haravan collection."
    columns:
      - name: id
        description: "Primary key for the collection (NocoDB haravan_collections ID)."
        tests:
          - unique
          - not_null
      - name: title
        description: "Collection display title."
      - name: discount_type
        description: "Discount type applied by the collection ('percent' or 'amount')."
      - name: discount_value
        description: "Discount value applied by the collection."
      - name: start_date
        description: "Start of the collection's validity window."
      - name: end_date
        description: "End of the collection's validity window."

  - name: fct_salesaya_temporary_products
    description: "Salesaya temporary-product feed — GIA report numbers of temporary products that have been sold on Haravan (matched to order lines by product and variant). Grain is one row per matched Haravan order line; not deduplicated, mirroring the legacy source view."
    columns:
      - name: gia_report_number
        description: "GIA report number of the sold temporary product."
        tests:
          - not_null

  - name: dim_salesaya_haravan_products
    description: "Raw Haravan products mirror, exposing only the columns used by Salesaya. Grain is one row per Haravan product."
    columns:
      - name: id
        description: "Primary key (Haravan product ID)."
        tests:
          - unique
          - not_null
      - name: title
        description: "Product title."
      - name: product_type
        description: "Product type."
      - name: images
        description: "Raw JSON array of product images."
      - name: published_scope
        description: "Scope where the product is published."

  - name: fct_salesaya_haravan_line_items
    description: "Raw Haravan order line items mirror, exposing only the columns used by Salesaya. Grain is one row per order line item."
    columns:
      - name: id
        description: "Primary key (Haravan line item ID)."
        tests:
          - unique
          - not_null
      - name: variant_id
        description: "Haravan variant ID sold on this line."
      - name: product_id
        description: "Haravan product ID sold on this line."

  - name: dim_salesaya_haravan_variants
    description: "Raw Haravan product variants mirror, exposing only the columns used by Salesaya. Grain is one row per Haravan variant."
    columns:
      - name: id
        description: "Primary key (Haravan variant ID)."
        tests:
          - unique
          - not_null
      - name: product_id
        description: "Parent Haravan product ID."
      - name: price
        description: "Variant selling price."
      - name: title
        description: "Variant title."
      - name: barcode
        description: "Variant barcode."
      - name: sku
        description: "Variant SKU."

  - name: fct_salesaya_haravan_warehouse_inventories
    description: "Raw Haravan variant stock-by-location mirror, exposing only the columns used by Salesaya. Grain is one row per (variant, location)."
    columns:
      - name: variant_id
        description: "Haravan variant ID."
        tests:
          - not_null
      - name: qty_available
        description: "Available quantity at this location."
      - name: loc_id
        description: "Haravan location/warehouse ID."
        tests:
          - not_null

  - name: dim_salesaya_haravan_orders
    description: "Raw Haravan orders mirror, exposing only the columns used by Salesaya. Grain is one row per Haravan order."
    columns:
      - name: id
        description: "Primary key (Haravan order ID)."
        tests:
          - unique
          - not_null
      - name: name
        description: "Haravan order name/number (e.g. ORDER1234)."

  - name: dim_salesaya_erpnext_leads
    description: "Raw ERPNext leads mirror, exposing only the columns used by Salesaya. Grain is one row per ERPNext lead."
    columns:
      - name: name
        description: "Primary key (ERPNext lead document name)."
        tests:
          - unique
          - not_null
      - name: qualification_status
        description: "Raw ERPNext qualification status string."
      - name: lead_owner
        description: "Lead owner (pre-sales) email."
      - name: first_name
        description: "Lead's first name."
      - name: status
        description: "Lead status."
      - name: budget_lead
        description: "Lead budget reference."
      - name: proposed_budget
        description: "Proposed budget for the lead."

  - name: dim_salesaya_erpnext_contacts
    description: "Raw ERPNext contacts mirror, exposing only the columns used by Salesaya. Grain is one row per ERPNext contact."
    columns:
      - name: name
        description: "Primary key (ERPNext contact document name)."
        tests:
          - unique
          - not_null
      - name: pancake_conversation_id
        description: "Pancake conversation ID."
      - name: pancake_page_id
        description: "Pancake page ID."
      - name: links
        description: "Raw dynamic_links JSON array linking this contact to other documents (e.g. Lead)."
      - name: creation
        description: "Timestamp the contact was created in ERPNext."
      - name: phone_nos
        description: "Raw JSON array of the contact's phone numbers."
      - name: email_ids
        description: "Raw JSON array of the contact's email addresses."
      - name: first_name
        description: "Contact's first name."
      - name: last_name
        description: "Contact's last name."
      - name: source
        description: "Marketing source of the contact."

  - name: fct_salesaya_erpnext_sales_orders
    description: "Raw ERPNext sales orders mirror, exposing only the columns used by Salesaya. Grain is one row per ERPNext sales order."
    columns:
      - name: id
        description: "Primary key (ERPNext sales order document name)."
        tests:
          - unique
          - not_null
      - name: customer
        description: "ERPNext customer document name."
      - name: fulfillment_status
        description: "Fulfillment status of the sales order."
      - name: modified
        description: "Timestamp the sales order was last modified."

  - name: dim_salesaya_erpnext_users
    description: "Raw ERPNext users mirror, exposing only the columns used by Salesaya. Grain is one row per ERPNext user."
    columns:
      - name: name
        description: "Primary key (ERPNext user document name)."
        tests:
          - unique
          - not_null
      - name: email
        description: "User email."
      - name: pancake_id
        description: "Linked Pancake user ID."

  - name: dim_salesaya_workplace_designs
    description: "Raw NocoDB designs mirror, exposing only the columns used by Salesaya. Grain is one row per design."
    columns:
      - name: id
        description: "Primary key (NocoDB design ID)."
        tests:
          - unique
          - not_null
      - name: design_code
        description: "Current design code."
      - name: code
        description: "Legacy design code."
      - name: erp_code
        description: "ERP design code."
      - name: backup_code
        description: "Backup design code."
      - name: gender
        description: "Target gender of the design."
      - name: design_type
        description: "Type of jewelry design."
      - name: wedding_ring_id
        description: "Parent wedding ring pair ID, if any."
      - name: collections_id
        description: "NocoDB collection ID."
      - name: ring_band_type
        description: "Ring band type."
      - name: ring_band_style
        description: "Ring band style."
      - name: ring_head_style
        description: "Ring head style."
      - name: diamond_holder
        description: "Diamond holder type."
      - name: "4view"
        description: "360-degree view asset reference."

  - name: dim_salesaya_workplace_design_images
    description: "Raw NocoDB design_design_images mirror, exposing only the columns used by Salesaya. Grain is one row per design image record."
    columns:
      - name: id
        description: "Primary key (NocoDB design image ID)."
        tests:
          - unique
          - not_null
      - name: design_id
        description: "Parent design ID."
      - name: images
        description: "Raw JSON array of images."
      - name: videos
        description: "Raw JSON array of videos."
      - name: render_images
        description: "Raw JSON array of render images."
      - name: retouch
        description: "Raw JSON array of retouched images."
      - name: try_on_images
        description: "Raw JSON array of try-on images."
      - name: "4view"
        description: "360-degree view asset reference."
      - name: database_created_at
        description: "Timestamp the record was created in NocoDB."
      - name: database_updated_at
        description: "Timestamp the record was last updated in NocoDB."
      - name: material_color
        description: "Material color shown in these images."

  - name: dim_salesaya_workplace_diamonds
    description: "Raw NocoDB diamonds mirror, exposing only the columns used by Salesaya. Grain is one row per diamond. Note: expected_arrival_date is omitted because the NocoDB diamonds table has no such field."
    columns:
      - name: id
        description: "Primary key (NocoDB diamond ID)."
        tests:
          - unique
          - not_null
      - name: variant_id
        description: "Associated Haravan variant ID."
      - name: image_urls
        description: "Raw JSON array of diamond images."
      - name: barcode
        description: "Diamond barcode."
      - name: product_id
        description: "Associated Haravan product ID."
      - name: edge_size_1
        description: "Diamond edge size 1."
      - name: edge_size_2
        description: "Diamond edge size 2."
      - name: color
        description: "Diamond color grade."
      - name: clarity
        description: "Diamond clarity grade."
      - name: fluorescence
        description: "Diamond fluorescence intensity."
      - name: shape
        description: "Diamond shape."
      - name: cut
        description: "Diamond cut grade."
      - name: carat
        description: "Diamond carat weight."
      - name: price
        description: "Diamond selling price."
      - name: is_incoming
        description: "True if the diamond is incoming (not yet in stock)."
      - name: report_no
        description: "Diamond certificate number."

  - name: dim_salesaya_workplace_products
    description: "Raw NocoDB products mirror, exposing only the columns used by Salesaya. Grain is one row per NocoDB product."
    columns:
      - name: id
        description: "Primary key (NocoDB product ID)."
        tests:
          - unique
          - not_null
      - name: design_id
        description: "Associated design ID."
      - name: haravan_product_id
        description: "Associated Haravan product ID."

  - name: dim_salesaya_workplace_collections
    description: "Raw NocoDB collections mirror, exposing only the columns used by Salesaya. Grain is one row per collection."
    columns:
      - name: id
        description: "Primary key (NocoDB collection ID)."
        tests:
          - unique
          - not_null
      - name: collection_name
        description: "Collection display name."

  - name: fct_salesaya_workplace_diamonds_haravan_collection
    description: "Raw NocoDB diamond-to-collection bridge mirror. Grain is one row per (diamond, collection) link."
    columns:
      - name: diamond_id
        description: "NocoDB diamond ID."
        tests:
          - not_null
      - name: haravan_collection_id
        description: "NocoDB haravan_collections ID."
        tests:
          - not_null

  - name: fct_salesaya_workplace_products_haravan_collection
    description: "Raw NocoDB product-to-collection bridge mirror. Grain is one row per (product, collection) link."
    columns:
      - name: products_id
        description: "NocoDB product ID."
        tests:
          - not_null
      - name: haravan_collections_id
        description: "NocoDB haravan_collections ID."
        tests:
          - not_null

  - name: dim_salesaya_workplace_temporary_products
    description: "Raw NocoDB temporary_products mirror, exposing only the columns used by Salesaya. Grain is one row per temporary product."
    columns:
      - name: gia_report_no
        description: "GIA report number of the temporary product."
      - name: haravan_variant_id
        description: "Matched Haravan variant ID, once the temporary product is sold."
      - name: haravan_product_id
        description: "Matched Haravan product ID, once the temporary product is sold."

  - name: dim_salesaya_workplace_variants
    description: "Raw NocoDB variants mirror, exposing only the columns used by Salesaya. Grain is one row per NocoDB variant."
    columns:
      - name: id
        description: "Primary key (NocoDB variant ID)."
        tests:
          - unique
          - not_null
      - name: product_id
        description: "Parent NocoDB product ID."
      - name: haravan_variant_id
        description: "Associated Haravan variant ID."
      - name: sku
        description: "Variant SKU."
      - name: ring_size
        description: "Ring size."
      - name: fineness
        description: "Gold fineness."
      - name: material_color
        description: "Material color."
      - name: final_discount_price
        description: "Final discounted price for this variant."

  - name: fct_salesaya_workplace_variant_serials
    description: "Raw NocoDB variant_serials mirror, exposing only the columns used by Salesaya. Grain is one row per physical serial-tracked item."
    columns:
      - name: id
        description: "Primary key (NocoDB serial ID)."
        tests:
          - unique
          - not_null
      - name: variant_id
        description: "Parent NocoDB variant ID."
      - name: serial_number
        description: "Serial number of the physical item."
      - name: stock_at
        description: "Current stock location name."
      - name: storage_size_1
        description: "Storage size 1."
      - name: storage_size_2
        description: "Storage size 2."
      - name: order_reference
        description: "Order reference, once sold."

  - name: fct_salesaya_workplace_variant_serials_diamonds
    description: "Raw NocoDB variant_serials-to-diamonds bridge mirror. Grain is one row per (serial, diamond) link."
    columns:
      - name: diamond_id
        description: "NocoDB diamond ID."
        tests:
          - not_null
      - name: variant_serials_id
        description: "NocoDB variant_serials ID."
        tests:
          - not_null

  - name: dim_salesaya_workplace_wedding_rings
    description: "Raw NocoDB wedding_rings mirror (all rows, unfiltered) — distinct from dim_salesaya_wedding_rings, which only includes validated wedding-ring pairs. Grain is one row per wedding ring."
    columns:
      - name: id
        description: "Primary key (NocoDB wedding_ring ID)."
        tests:
          - unique
          - not_null
