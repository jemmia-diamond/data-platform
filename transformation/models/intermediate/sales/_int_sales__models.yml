version: 2

models:
  - name: int_sales__orders
    description: "The single unified sales orders table for the enterprise, merging Haravan and ERPNext data."
    depends_on:
      - model: int_haravan__order_ancestry
      - model: int_erpnext__order_groups
    columns:
      - name: unified_sales_order_id
        description: "Primary key of the unified sales orders table (ERPNext Sales Order ID if matched, fallback to Haravan Order ID)."
        tests:
          - unique
          - not_null
      - name: unified_customer_id
        description: "Foreign key linking directly to int_crm__customers under the CRM topic."
      - name: erp_sales_order_id
        description: "Raw source sales order ID from ERPNext."
      - name: haravan_order_id
        description: "Raw source order ID from Haravan, used for marketing data joins."

  - name: int_sales__order_items
    description: "Sales order line items mapped across both systems."
    columns:
      - name: unified_sales_order_item_id
        description: "Primary key from ERPNext Sales Order Item."
        tests:
          - unique
          - not_null

  - name: int_sales__order_product_categories
    description: "Flattened order product categories from ERPNext Sales Order child table. Grain: 1 row = 1 order × 1 product category."
    columns:
      - name: erp_sales_order_id
        description: "Foreign key to stg_erpnext__sales_orders."
        tests:
          - not_null
      - name: product_category_id
        description: "ERPNext Product Category ID (e.g. PC08421)."
        tests:
          - not_null
      - name: category_name
        description: "Product category display name (e.g. Nhẫn Nam KCTN Nguyên Chiếc)."

  - name: int_sales__order_purchase_purposes
    description: "Flattened order purchase purposes from ERPNext Sales Order child table. Grain: 1 row = 1 order × 1 purchase purpose."
    columns:
      - name: erp_sales_order_id
        description: "Foreign key to stg_erpnext__sales_orders."
        tests:
          - not_null
      - name: purchase_purpose_id
        description: "ERPNext Purchase Purpose ID (e.g. PP08603)."
        tests:
          - not_null
      - name: purpose_name
        description: "Purchase purpose display name (e.g. BT - Mua cho bản thân)."

  - name: int_sales__sold_variants
    description: "Sold variants — source of truth for whether a variant/product has ever appeared in a Haravan sale. Grain: 1 row per distinct (variant_id, product_id) that has been sold."
    columns:
      - name: variant_id
        description: "Haravan variant ID."
        tests:
          - not_null
      - name: product_id
        description: "Parent Haravan product ID."
        tests:
          - not_null