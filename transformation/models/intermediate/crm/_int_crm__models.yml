version: 2

models:
  - name: int_crm__customers
    description: "Unified customer profile merging ERPNext and Haravan data with aggregated order metrics."
    columns:
      - name: unified_customer_id
        description: "Primary unique identifier for the customer across all systems."
        tests:
          - unique
          - not_null
  
  - name: int_crm__leads
    description: "Cleaned and enriched Lead data from ERPNext with parsed Pancake metadata."
    columns:
      - name: lead_id
        description: "Primary key for the lead from ERPNext source."
        tests:
          - unique
          - not_null
      - name: is_converted
        description: "Boolean flag indicating if the lead was qualified/converted."
        tests:
          - not_null

  - name: int_crm__contacts
    columns:
      - name: contact_id
        description: "Primary key for the contact from ERPNext source."
        tests:
          - unique
          - not_null

  - name: int_crm__addresses
    columns:
      - name: address_id
        description: "Primary key for the address from ERPNext source."
        tests:
          - unique
          - not_null

  - name: int_crm__address_links
    columns:
      - name: address_link_id
        description: "Primary key for the address links from ERPNext source."
        tests:
          - unique
          - not_null

  - name: int_crm__lead_sources
    description: "Lead source lookup table from ERPNext."
    columns:
      - name: lead_source_id
        description: "Primary key for the lead source."
        tests:
          - unique
          - not_null

  - name: int_crm__lead_products
    description: "Lead product type lookup table from ERPNext."
    columns:
      - name: lead_product_id
        description: "Primary key for the lead product type."
        tests:
          - unique
          - not_null

  - name: int_crm__lead_demands
    description: "Lead demand/purpose lookup table from ERPNext."
    columns:
      - name: lead_demand_id
        description: "Primary key for the lead demand."
        tests:
          - unique
          - not_null

  - name: int_crm__lead_budgets
    description: "Lead budget range lookup table from ERPNext."
    columns:
      - name: lead_budget_id
        description: "Primary key for the lead budget range."
        tests:
          - unique
          - not_null

  - name: int_crm__lead_preferred_products
    description: "Lead preferred products bridge — 1 lead can have many preferred products (1-n). Unnested from JSON array."
    columns:
      - name: preferred_product_id
        description: "Primary key — unique row from ERPNext child table."
        tests:
          - unique
          - not_null
      - name: lead_id
        description: "Foreign key to int_crm__leads."
        tests:
          - not_null
      - name: product_type
        description: "Product type reference ID (e.g. CRM-LEAD-PRODUCT-0014)."

  - name: int_crm__erpnext_customers
    description: "Raw ERPNext customer record, passthrough of stg_erpnext__customers. Distinct from int_crm__customers (the unified Haravan+ERPNext marketing profile) — this preserves the full ERPNext system shape for consumers that need it verbatim."
    columns:
      - name: customer_id
        description: "Primary key for the customer from ERPNext source."
        tests:
          - unique
          - not_null

  - name: int_crm__contact_lead_links
    description: "Fan-out of each contact's dynamic_links JSON array into one row per (contact, link) pair, for resolving which lead(s) a contact is linked to."
    columns:
      - name: contact_id
        description: "ERPNext contact ID."
        tests:
          - not_null
      - name: lead_id
        description: "Linked document name from dynamic_links (only meaningful when link_doctype = 'Lead')."
      - name: link_doctype
        description: "Doctype of the linked document (e.g. Lead, Customer)."

  - name: int_crm__contact_conversations
    description: "Contact rows with the first dynamic_links entry extracted as lead_id, for conversation-level reporting."
    columns:
      - name: contact_id
        description: "ERPNext contact ID."
        tests:
          - unique
          - not_null
      - name: lead_id
        description: "Link name of the first dynamic_links entry (regardless of doctype)."
      - name: pancake_page_id
        description: "Pancake page ID this conversation belongs to."
      - name: pancake_conversation_id
        description: "Pancake conversation ID."
      - name: source_name
        description: "Marketing source name for this contact."

